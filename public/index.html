<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول · NileChat</title>
<link rel="icon" type="image/png" href="/assets/logo-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #6C5CE7;
    --primary-light: #a29bfe;
    --primary-dark: #5a4bd1;
    --secondary: #00D2FF;
    --bg: #f0f2f5;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --danger: #ef4444;
    --sidebar-bg: #0f0f23;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'DM Sans',sans-serif;
    background:var(--sidebar-bg);
    background-image:radial-gradient(ellipse at 15% 20%, rgba(108,92,231,0.25) 0%, transparent 55%),
                      radial-gradient(ellipse at 85% 80%, rgba(0,210,255,0.18) 0%, transparent 55%);
    color:var(--text);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}
h1,h2{font-family:'Space Grotesk','DM Sans',sans-serif}

.login-card{
    background:var(--surface);
    border-radius:22px;
    padding:40px 36px;
    width:380px;
    max-width:calc(100vw - 32px);
    box-shadow:0 25px 70px rgba(0,0,0,0.35);
}
.login-logo{
    width:110px;height:110px;
    object-fit:contain;
    display:block;
    margin:0 auto 22px;
}
.login-card h1{font-size:21px;font-weight:700;margin-bottom:4px}
.login-card .subtitle{color:var(--text-secondary);font-size:13.5px;margin-bottom:26px}

.field-label{font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.field-wrap{margin-bottom:16px}
.login-input{
    width:100%;padding:12px 14px;border-radius:12px;
    border:1.5px solid var(--border);background:var(--bg);
    font-size:14px;font-family:inherit;color:var(--text);outline:none;
    transition:border-color .2s;
}
.login-input:focus{border-color:var(--primary)}

.login-btn{
    width:100%;padding:13px;border-radius:12px;border:none;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;font-size:14.5px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:all .2s;margin-top:6px;
    display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{box-shadow:0 8px 22px rgba(108,92,231,0.4)}
.login-btn:disabled{opacity:.6;cursor:default;box-shadow:none}

.login-error{
    color:var(--danger);font-size:13px;margin-top:14px;min-height:16px;
    text-align:center;line-height:1.5;
}

.spinner{
    width:15px;height:15px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
    animation:spin .7s linear infinite;display:none;
}
.login-btn.loading .spinner{display:inline-block}
.login-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="login-card">
    <img src="/assets/logo.png" alt="NileChat" class="login-logo">
    <h1>تسجيل الدخول</h1>
    <div class="subtitle">أهلاً بيك في لوحة تحكم NileChat، سجّل دخولك بإيميلك وكلمة السر</div>

    <form id="login-form" autocomplete="on">
        <div class="field-wrap">
            <label class="field-label" for="login-email">Email</label>
            <input type="email" class="login-input" id="login-email" placeholder="agent@example.com" autocomplete="username" required>
        </div>
        <div class="field-wrap">
            <label class="field-label" for="login-password">Password</label>
            <input type="password" class="login-input" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
            <span class="spinner"></span>
            <span class="btn-text">تسجيل الدخول</span>
        </button>

        <div class="login-error" id="login-error"></div>
    </form>
</div>

<script>
// لو المستخدم مسجل دخول بالفعل، نوديه على الداشبورد على طول من غير ما نعرض فورم الدخول
(function () {
    const token = localStorage.getItem('nilechat_token');
    const user = localStorage.getItem('nilechat_user');
    if (token && user) {
        window.location.href = '/dashboard.html';
    }
})();

const form = document.getElementById('login-form');
const btn = document.getElementById('login-btn');
const errorBox = document.getElementById('login-error');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.textContent = '';

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    btn.classList.add('loading');
    btn.disabled = true;

    try {
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
            errorBox.textContent = data.error || 'حصل خطأ، حاول تاني';
            return;
        }

        localStorage.setItem('nilechat_token', data.token);
        localStorage.setItem('nilechat_user', JSON.stringify(data.user));

        // بنحول المستخدم على الصفحة الحالية (لوحة التحكم) بعد تسجيل الدخول بنجاح
        window.location.href = '/dashboard.html';
    } catch (err) {
        errorBox.textContent = 'مش قادر نوصل للسيرفر، تأكد من الإنترنت وحاول تاني';
    } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
    }
});
</script>
</body>
</html>
